<script src="../jquery-3.4.1.slim.min.js"></script>
<script src="./dist/han-spread.min.js?=15"></script>
<script class="code-js">
  var $_GET = function (a, b) { try { return RegExp("[#?&;]" + a + "=([^?&#;]*)").exec(location.href)[1] } catch (a) { return b || null } };
  var lang = 'en';
  var charMap = {
    A: 1,
    B: 2,
    C: 3,
    D: 4,
    E: 5,
    F: 6,
    G: 7,
    H: 8,
    I: 9,
    J: 10,
    K: 11,
    L: 12,
    M: 13,
    N: 14,
    O: 15,
    P: 16,
    Q: 17,
    R: 18,
    S: 19,
    T: 20,
    U: 21,
    V: 22,
    W: 23,
    X: 24,
    Y: 25,
    Z: 26
  };
  var maxColumnNumber = 25;

  if (window.parent && window.parent.userDataGlobal && window.parent.userDataGlobal.user_config) {
    lang = window.parent.userDataGlobal.user_config.lang;
  }
  han.Grid.setLanguage(['en', 'ko'].indexOf(lang) !== -1 ? lang : 'en');

  function checkDuplicate(s) {
    var colSpan = 0;
    Object.keys(s).forEach(function (col) {
      var data = s[col];
      if (data.colSpan) {
        if (colSpan > 1) {
          delete data.colSpan;
        } else {
          colSpan = data.colSpan;
          return;
        }
      }

      if (colSpan > 0) {
        colSpan -= 1;
      }
    })
  }

  function columnNameToNumber(str) {
    var result = 0;
    if (/^[A-Z]+$/.test(str)) {
      for (let i = 0; i < str.length; i++) {
        result = result * 26 + charMap[str[i]];
      }
    }
    return result;
  }

  if (window.parent && _getSpreadData(null)) {
    Object.keys(_getSpreadData('extend', {})).forEach(function (d) {
      /*  GQ-125191  *** this will delete col span of some table  */
      /* checkDuplicate(_getSpreadData('extend', {})[d]); */
    })
  }

  /*
  * Usually, this has effect when user re-submit or modify data, then the existing data may have more columns than default maxColumnNumber
  * => Update maxColumnNumber to the maximum column number of existing data
  * @ticket GQ-181658
  */
  var spreadData = _getSpreadData('data', []);
  spreadData.forEach(function (row, idx) {
    var columnNames = Object.keys(row);
    if (columnNames && columnNames.length > 0) {
      columnNames.forEach(function (name) {
        maxColumnNumber = Math.max(maxColumnNumber, columnNameToNumber(name))
      })
    }
  });

  var grid = new han.Grid({
    el: document.getElementById('grid'),
    bodyHeight: window.innerHeight - 40,
    header: {
      height: 30
    },
    rowHeaders: ['rowNum'],
    columns: maxColumnNumber,
    coords: {
      columns: _getSpreadData('columns', {}),
      rows: _getSpreadData('rows', {}),
    },
    rows: 1000,
    rowHeight: 30,
    minRowHeight: 30,
    scrollX: true,
    columnOptions: {
      resizable: true
    },
    disabled: _getSpreadData('disabled', false),
    extendData: _getSpreadData('extend', {}),
    objectsItems: _getSpreadData('objects', []),
    onGridMounted: function () {
      if (window.parent) {
        var useViewMode = _getSpreadData('disabled');
        var extendData = _getSpreadData('extend', {}); // Include format for cells

        _getSpreadData('data', []).map(function (row) {
          var rowIndex = row.rowKey;

          Object.keys(row).map(function (key) {
            if (['rowKey', 'rowSpanMap', '_number'].indexOf(key) !== -1) return;

            if (useViewMode) {
              var _value = row[key];

              if (extendData[rowIndex]) {
                var extendValue = extendData[rowIndex][key];
                // With format == 'date', when render to view, it shows wrong value
                /* if (extendValue && extendValue.format == "date") {
                  grid.dispatch("setExtendData", {rowKey: rowIndex, column: key}, {format: ""}); // Clear format date on cell
                  var formulaValue = grid.formulas.parse(row[key]);
                  _value = new Date(formulaValue).toLocaleDateString(); // Format date data manually
                } */
              }

              grid.setValue(rowIndex, key, _value);
            }
            else {
              grid.setValue(rowIndex, key, row[key]);
            }
          })

          setTimeout(() => {
            grid.dispatch('setRowCoordsHeight', rowIndex, null, true);
          }, 100);
        })

        grid.undoManager.reset();

        setTimeout(function () {
          if (_getSpreadData('disabled', false)) {
            var initSpreadViewStyles = {};
            initSpreadViewStyles['table_width'] = document.querySelector('table').offsetWidth;

            const e = function () {
              const tableWidth = document.querySelector('table');
              const windowWidth = window.innerWidth;
              const spreadViewOnly = document.querySelector('.spread-view-only');
              tableWidth.setAttribute("border", 1)

              tableWidth.style.zoom = '';
              // console.log("windowWidth ==> ", windowWidth);
              // console.log("tableWidth ==> ", tableWidth);
              if (window.parent.is_printing && windowWidth < tableWidth.offsetWidth && !window.parent.is_using_custom_scaling) {
                const percent = (windowWidth / (tableWidth.offsetWidth + 10)) * 100;
                spreadViewOnly.style.zoom = percent + '%';
                initSpreadViewStyles['zoom'] = percent + '%';
              }

              if (window.parent.is_using_custom_scaling) {
                spreadViewOnly.style.zoom = "100%";
              }
            }
            console.log("resize happen ..");
            e();

            window.addEventListener('resize', e);

            var initTableStyles = {};
            // Listen for scaling process when printing
            window.addEventListener('message', function (e) {
              var table = document.querySelector('table');
              var action = e.data.action;
              var value = e.data.value;
              const spreadViewOnly = document.querySelector('.spread-view-only');
              if (action == 'scale' && value) {
                spreadViewOnly.style.transformOrigin = "top left";
                spreadViewOnly.style.transform = "scale(" + value + "%)";

                var rectData = table.getBoundingClientRect();
                sendEventToParent('resize', {
                  tableWidth: rectData.width,
                  tableHeight: rectData.height
                });
              }
              else if (action === 'increase_table_width') {
                table.style.width = value + '%';
              }
              else if (action === 'reset') {
                table.style.width = initSpreadViewStyles['table_width'] + 'px';
                spreadViewOnly.style.transformOrigin = "initial";
                spreadViewOnly.style.transform = "initial";
                if (initSpreadViewStyles['zoom']) {
                  spreadViewOnly.style.zoom = initSpreadViewStyles['zoom'];
                }
              }
            });
          }
        }, 300)
      }

      sendEventToParent('init', {
        getData: getData
      });
    }
  });

  function getData() {
    const data = {
      data: grid.getModifiedRows().updatedRows,
      extend: grid.getExtendDataModified(),
      columns: grid.getModifedColumnWidths(),
      objects: grid.getObjects(),
      rows: grid.getModifedRowWidths(),
    };
    return data;
  }

  function sendEventToParent(name, params) {
    if (window.parent) {
      var key = $_GET('key', null);
      var fn = 'receivedEventFromIframe';

      if (key) {
        fn += key;
      }

      window.parent[fn](name, params);
    }
  }
</script>

</html>
